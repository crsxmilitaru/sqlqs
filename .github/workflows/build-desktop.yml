name: Build Desktop

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != '' }}
      HAS_APPLE_NOTARIZATION: ${{ (secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != '') || (secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '') }}
      HAS_APPLE_RELEASE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && ((secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != '') || (secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '')) }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Prepare App Store Connect API key
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_API_KEY == 'true'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          cat > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" <<'EOF'
          ${{ secrets.APPLE_API_KEY_P8 }}
          EOF
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" >> "$GITHUB_ENV"

      - name: Warn when macOS signing secrets are missing
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_CERTIFICATE != 'true'
        run: echo "::warning::APPLE_CERTIFICATE/APPLE_CERTIFICATE_PASSWORD are not configured. This macOS build will be ad-hoc signed for testing only and may still require manual approval in Gatekeeper."

      - name: Warn when macOS notarization secrets are missing
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_NOTARIZATION != 'true'
        run: echo "::warning::No Apple notarization credentials were provided. This macOS build will fall back to ad-hoc signing instead of producing a Developer ID-signed but unnotarized app."

      - name: Build desktop app
        if: matrix.os != 'macos-latest' || env.HAS_APPLE_RELEASE_SIGNING == 'true'
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Build ad-hoc signed macOS app
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_RELEASE_SIGNING != 'true'
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlqs-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
